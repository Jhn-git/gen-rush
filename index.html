<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBD Skill Check</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="streak">STREAK: <span id="streakValue">0</span></div>
        <div id="highScore">HIGH SCORE: <span id="highScoreValue">0</span></div>
    </div>
    <button id="muteBtn">Mute</button>
    <div id="gameOverScreen" class="hidden">
        <div class="gameOverContent">
            <h1>Game Over</h1>
            <p>Streak: <span id="finalScore">0</span></p>
            <p>High Score: <span id="finalHighScore">0</span></p>
            <p class="instruction">Press SPACE to restart</p>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
